<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>글쓰기 — 오재</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css">
<style>
:root{
  --red:#E0403C; --red-deep:#A32D2D; --red-tint:#FCEBEB;
  --ink:#191F28; --gray:#8B95A1; --gray-light:#B0B8C1;
  --bg:#FFFFFF; --card:#FFFFFF; --line:#EEF0F2;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:Pretendard,-apple-system,sans-serif;background:#EDEEF0;color:var(--ink);letter-spacing:-0.2px}
.app{max-width:420px;margin:0 auto;background:var(--bg);min-height:100vh;padding-bottom:88px;position:relative}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
.hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;background:var(--bg)}
.hd h1{font-size:21px;font-weight:800;letter-spacing:-0.6px}
.hd .hbtn{background:none;border:0;display:flex;padding:4px}
.chipbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
  display:flex;gap:7px;overflow-x:auto;padding:8px 20px 12px;scrollbar-width:none}
.chipbar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:13px;font-weight:500;padding:7px 14px;border-radius:18px;
  border:0.5px solid var(--line);background:var(--card);color:#4E5968}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:600}
.gnb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:0.5px solid var(--line);
  display:flex;justify-content:space-around;padding:8px 0 calc(10px + env(safe-area-inset-bottom));z-index:30}
.gnb a{text-align:center;width:60px;padding-top:3px}
.gnb .lb{font-size:10.5px;color:var(--gray);letter-spacing:-0.2px;margin-top:2px}
.gnb a.on .lb{color:var(--ink);font-weight:700}
.side{display:none}
.rail{display:none}
@media(min-width:1240px){
  body{background:#F7F8FA}
  .app{max-width:600px;border-left:0.5px solid #EEF0F2;border-right:0.5px solid #EEF0F2}
  .gnb{display:none}
  .side{display:flex;position:fixed;top:0;left:calc(50% - 560px);width:230px;height:100vh;flex-direction:column;padding:26px 14px;z-index:40}
  .side .s-logo{display:flex;align-items:center;gap:8px;padding:2px 12px 24px}
  .side .s-logo b{font-size:22px;font-weight:800;letter-spacing:-0.8px;color:#191F28}
  .side .s-logo i{font-size:11px;color:#8B95A1;font-style:normal;padding-top:7px}
  .side .ni{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;font-size:15px;font-weight:500;color:#4E5968;margin-bottom:2px}
  .side .ni:hover{background:#F2F3F5}
  .side .ni.on{color:#191F28;font-weight:700;background:#F2F3F5}
  .side .s-write{margin-top:16px;background:#E0403C;color:#fff;border:0;border-radius:14px;padding:14px;font-size:15px;font-weight:700;letter-spacing:-0.3px}
  .side .s-write:hover{background:#C9362F}
  .side .s-ft{margin-top:auto;font-size:11px;color:#B0B8C1;padding:0 12px;line-height:1.7}
  .rail{display:block;position:fixed;top:0;left:calc(50% + 320px);width:280px;height:100vh;overflow-y:auto;padding:26px 0;scrollbar-width:none}
  .rail .rw{background:#fff;border:0.5px solid #EEF0F2;border-radius:16px;padding:16px 18px;margin-bottom:14px}
  .rail h3{font-size:14.5px;font-weight:700;letter-spacing:-0.4px;margin-bottom:8px}
  .rail .ri{display:flex;gap:9px;align-items:baseline;padding:7px 0;font-size:13px;color:#26303B}
  .rail .ri b{color:#E0403C;font-size:12.5px;font-weight:800;width:12px;flex-shrink:0}
  .rail .ri span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rail .rn{display:block;padding:7px 0;font-size:13px;color:#26303B;line-height:1.5}
  .rail .rn i{display:block;font-style:normal;font-size:11px;color:#8B95A1;margin-top:2px}
}

.app{padding-bottom:0}
.whd{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--line)}
.whd .x{background:none;border:0;display:flex;padding:4px}
.whd .t{font-size:16px;font-weight:700}
.whd .submit{background:var(--red);color:#fff;border:0;border-radius:16px;padding:8px 16px;font-size:13.5px;font-weight:700}
.wbody{padding:16px 20px}
.wlabel{font-size:12.5px;font-weight:600;color:var(--gray);margin:6px 0 10px}
.wtitle{width:100%;border:0;outline:none;font-family:inherit;font-size:19px;font-weight:700;
  letter-spacing:-0.5px;padding:14px 0;border-bottom:0.5px solid var(--line)}
.wtitle::placeholder{color:#C9CFD6}
.wtext{width:100%;border:0;outline:none;font-family:inherit;font-size:15px;line-height:1.75;
  letter-spacing:-0.3px;padding:16px 0;min-height:280px;resize:none;color:#26303B}
.wtext::placeholder{color:#C9CFD6}
.wtool{position:sticky;bottom:0;background:var(--card);border-top:0.5px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:12px 20px calc(14px + env(safe-area-inset-bottom))}
.wtool button{background:none;border:0;display:flex;align-items:center;gap:6px;font-size:13px;color:#4E5968;font-weight:500}
.wnote{font-size:11.5px;color:var(--gray-light);line-height:1.6;padding:14px 0 20px}
@media(min-width:1240px){.wtool{max-width:600px}}
</style>
</head>
<body>
<div class="app">


  <header class="whd">
    <button class="x" aria-label="닫기" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M6,6 L18,18 M18,6 L6,18" stroke="#191F28" stroke-width="1.9" stroke-linecap="round"/></svg>
    </button>
    <span class="t">글쓰기</span>
    <button class="submit">등록</button>
  </header>
  <main class="wbody">
    <div class="wlabel">카테고리 선택</div>
    <div class="chipbar" style="position:static;padding:0 0 6px;background:none">
      <button class="chip on">자유수다</button>
      <button class="chip">부동산</button>
      <button class="chip">주식</button>
      <button class="chip">코인</button>
      <button class="chip">펀드·ETF</button>
      <button class="chip">예적금·절약</button>
    </div>
    <div class="wlabel" style="margin-top:14px">말머리 (선택)</div>
    <div class="chipbar" style="position:static;padding:0 0 6px;background:none">
      <button class="chip on">일반</button>
      <button class="chip">수익인증</button>
      <button class="chip">거래인증</button>
      <button class="chip">질문</button>
    </div>
    <input class="wtitle" type="text" placeholder="제목을 입력하세요" aria-label="제목">
    <textarea class="wtext" placeholder="자유롭게 이야기를 나눠보세요.&#10;&#10;· 수익 인증은 사진과 함께 올리면 반응이 좋아요&#10;· 특정 종목 매수 권유, 리딩방 홍보는 제재 대상입니다" aria-label="내용"></textarea>
    <div class="wnote">오재 커뮤니티의 글은 정보 공유 목적이며 투자 권유가 아닙니다. 투자 판단의 책임은 본인에게 있습니다.</div>
  </main>
  <div class="wtool">
    <button><svg width="20" height="20" viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="14" rx="2" fill="none" stroke="#4E5968" stroke-width="1.7"/><circle cx="9" cy="10.5" r="1.8" fill="none" stroke="#4E5968" stroke-width="1.7"/><path d="M4.5,17 L9.5,13 L12.5,15.5 L16.5,11.5 L20,15" fill="none" stroke="#4E5968" stroke-width="1.7" stroke-linejoin="round"/></svg>사진</button>
    <button><svg width="20" height="20" viewBox="0 0 24 24"><path d="M12,4 v16 M4,12 h16" stroke="#4E5968" stroke-width="1.7" stroke-linecap="round"/></svg>투표 등 추가 기능은 추후</button>
  </div>

</div>
<script>
document.querySelectorAll('.chipbar .chip').forEach(function(c){
  c.addEventListener('click',function(){
    c.parentElement.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on')});
    c.classList.add('on');
  });
});
</script>
</body>
</html>
