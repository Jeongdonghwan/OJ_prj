{% extends "base.html" %}
{% block title %}검색 — 오재{% endblock %}
{% block page_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/community.css') }}">
<style>
.searchbar{display:flex;gap:8px;padding:10px 20px}
.searchbar input{flex:1;border:0.5px solid var(--line);background:#F5F6F8;border-radius:20px;padding:11px 16px;font-size:14px;font-family:inherit;outline:none}
.searchbar input:focus{border-color:#D5D9DE;background:#fff}
.searchbar button{background:var(--ink);color:#fff;border:0;border-radius:16px;padding:0 18px;font-size:13.5px;font-weight:600;cursor:pointer}
.noresult{padding:40px 20px;text-align:center;color:var(--gray);font-size:14px}
</style>{% endblock %}
{% block content %}
  <header class="hd">
    <h1>검색</h1>
    <button aria-label="닫기" onclick="history.back()">
      <svg width="21" height="21" viewBox="0 0 24 24"><path d="M6,6 L18,18 M18,6 L6,18" stroke="#191F28" stroke-width="1.9" stroke-linecap="round"/></svg>
    </button>
  </header>
  <form class="searchbar" method="get" action="{{ url_for('main.search') }}">
    <input type="text" name="q" placeholder="제목, 내용 검색" value="{{ q or '' }}" autofocus>
    <button type="submit">검색</button>
  </form>
  <main class="feed">
    {% if q and not posts %}
    <div class="noresult">'{{ q }}'에 대한 검색 결과가 없습니다.</div>
    {% endif %}
    {% for p in posts %}
    {% include "_post_card.html" %}
    {% endfor %}
  </main>
{% endblock %}
